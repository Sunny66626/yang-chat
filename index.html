<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>旸与雪</title>
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="apple-touch-icon.png">
<style>
:root {
  --bg: #e8f0e4;
  --chat-bg: #dce8d6;
  --bubble-right: #95d475;
  --bubble-right-text: #1a1a1a;
  --bubble-left: #ffffff;
  --bubble-left-text: #1a1a1a;
  --header-bg: #f0f5ec;
  --header-border: #c8d8c0;
  --input-bg: #f5f8f2;
  --input-border: #c8d8c0;
  --btn-primary: #6bae56;
  --btn-primary-hover: #5a9d47;
  --text-muted: #8a9882;
  --text-secondary: #5a6855;
  --shadow: rgba(0,0,0,0.06);
  --avatar-size: 40px;
  --radius: 12px;
  --font: -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: var(--font);
  background: var(--bg);
  height: 100vh; height: 100dvh;
  display: flex; flex-direction: column;
  overflow: hidden;
  -webkit-text-size-adjust: 100%;
}
.header {
  background: var(--header-bg);
  border-bottom: 1px solid var(--header-border);
  padding: 12px 16px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.header-left { display: flex; align-items: center; gap: 10px; }
.header-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  object-fit: cover; border: 2px solid var(--btn-primary);
}
.header-name { font-size: 17px; font-weight: 600; color: #2a3a24; }
.header-status { font-size: 12px; color: var(--text-muted); }
.header-right { display: flex; gap: 8px; }
.header-btn {
  background: none; border: none; font-size: 20px; cursor: pointer;
  padding: 6px; border-radius: 8px; color: var(--text-secondary);
  transition: background 0.2s;
}
.header-btn:hover { background: rgba(0,0,0,0.05); }
.chat-area {
  flex: 1; overflow-y: auto; padding: 12px 16px;
  background: var(--chat-bg); scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
}
.msg-wrapper {
  display: flex; margin-bottom: 12px; align-items: flex-start; gap: 8px;
}
.msg-wrapper.right { flex-direction: row-reverse; }
.msg-avatar {
  width: var(--avatar-size); height: var(--avatar-size);
  border-radius: 6px; object-fit: cover; flex-shrink: 0;
}
.msg-content { max-width: 70%; display: flex; flex-direction: column; }
.msg-wrapper.right .msg-content { align-items: flex-end; }
.msg-bubble {
  padding: 10px 14px; border-radius: var(--radius);
  font-size: 15px; line-height: 1.6; word-break: break-word;
  position: relative; white-space: pre-wrap;
}
.msg-wrapper.left .msg-bubble {
  background: var(--bubble-left); color: var(--bubble-left-text);
  border-top-left-radius: 4px; box-shadow: 0 1px 2px var(--shadow);
}
.msg-wrapper.right .msg-bubble {
  background: var(--bubble-right); color: var(--bubble-right-text);
  border-top-right-radius: 4px; box-shadow: 0 1px 2px var(--shadow);
}
.msg-time {
  font-size: 11px; color: var(--text-muted); margin-top: 4px; padding: 0 4px;
}
.thinking-toggle {
  font-size: 12px; color: var(--text-muted); cursor: pointer;
  margin-top: 6px; padding: 2px 4px; user-select: none;
}
.thinking-toggle:hover { color: var(--text-secondary); }
.thinking-content {
  display: none; font-size: 13px; color: var(--text-muted);
  background: #f0f4ec; border-left: 3px solid var(--btn-primary);
  padding: 8px 12px; margin-top: 6px; border-radius: 0 8px 8px 0;
  line-height: 1.5; white-space: pre-wrap;
}
.thinking-content.show { display: block; }
.input-area {
  background: var(--header-bg); border-top: 1px solid var(--header-border);
  padding: 10px 12px; display: flex; align-items: flex-end; gap: 8px;
  flex-shrink: 0;
}
.input-area textarea {
  flex: 1; border: 1px solid var(--input-border); border-radius: 20px;
  padding: 10px 16px; font-size: 15px; font-family: var(--font);
  background: var(--input-bg); resize: none; max-height: 120px;
  line-height: 1.4; outline: none; transition: border-color 0.2s;
}
.input-area textarea:focus { border-color: var(--btn-primary); }
.send-btn {
  width: 40px; height: 40px; border-radius: 50%; border: none;
  background: var(--btn-primary); color: white; font-size: 18px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: background 0.2s;
}
.send-btn:hover { background: var(--btn-primary-hover); }
.send-btn:disabled { background: #b8ccb0; cursor: not-allowed; }
.send-btn.stop { background: #e85d5d; }
.send-btn.stop:hover { background: #d44a4a; }
.settings-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.4); z-index: 100;
  justify-content: center; align-items: center;
}
.settings-overlay.show { display: flex; }
.settings-panel {
  background: var(--header-bg); border-radius: 16px; padding: 24px;
  width: 90%; max-width: 500px; max-height: 85vh; overflow-y: auto;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
}
.settings-panel h3 { font-size: 18px; color: #2a3a24; margin-bottom: 16px; }
.setting-group { margin-bottom: 16px; }
.setting-group label {
  display: block; font-size: 13px; color: var(--text-secondary);
  margin-bottom: 6px; font-weight: 500;
}
.setting-group input, .setting-group select, .setting-group textarea {
  width: 100%; border: 1px solid var(--input-border); border-radius: 10px;
  padding: 10px 12px; font-size: 14px; font-family: var(--font);
  background: var(--input-bg); outline: none;
}
.setting-group textarea { min-height: 120px; resize: vertical; }
.setting-group input:focus, .setting-group select:focus, .setting-group textarea:focus {
  border-color: var(--btn-primary);
}
.settings-row { display: flex; gap: 12px; }
.settings-row .setting-group { flex: 1; }
.settings-actions {
  display: flex; gap: 10px; justify-content: flex-end; margin-top: 8px;
}
.settings-actions button {
  padding: 8px 20px; border-radius: 10px; border: none;
  font-size: 14px; cursor: pointer; font-family: var(--font);
}
.btn-save { background: var(--btn-primary); color: white; }
.btn-cancel { background: #ddd; color: #555; }
.date-sep { text-align: center; margin: 16px 0; font-size: 12px; color: var(--text-muted); }
.date-sep span { background: rgba(0,0,0,0.06); padding: 4px 12px; border-radius: 10px; }
.chat-area::-webkit-scrollbar { width: 4px; }
.chat-area::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 4px; }
@media (max-width: 600px) {
  .msg-content { max-width: 78%; }
  .settings-panel { width: 95%; padding: 18px; }
}
</style>
</head>

    <button class="header-btn" onclick="exportChat()" title="导出">📋</button>
    <button class="header-btn" onclick="summarizeChat()" title="摘要">📝</button>
    <button class="header-btn" onclick="clearChat()" title="清空">🗑️</button>
    <button class="header-btn" onclick="showSettings()" title="设置">⚙️</button>
  </div>
</div>
<div class="chat-area" id="chatArea">
  <div class="date-sep"><span id="todayDate"></span></div>
</div>
<div class="input-area">
  <textarea id="msgInput" rows="1" placeholder="说点什么..." onkeydown="handleKey(event)" oninput="autoGrow(this)"></textarea>
  <button class="send-btn" id="sendBtn" onclick="handleSend()">
    <span id="sendIcon">↑</span>
  </button>
</div>
<div class="settings-overlay" id="settingsOverlay" onclick="closeSettingsOutside(event)">
  <div class="settings-panel">
    <h3>⚙️ 设置</h3>
    <div class="setting-group">
      <label>API Key</label>
      <input type="password" id="apiKeyInput" placeholder="sk-ant-...">
    </div>
    <div class="settings-row">
      <div class="setting-group">
        <label>模型</label>
        <select id="modelSelect">
          <option value="claude-opus-4-6">Opus 4.6</option>
          <option value="claude-opus-4-8">Opus 4.8</option>
          <option value="claude-sonnet-4-6">Sonnet 4.6</option>
          <option value="claude-haiku-4-5">Haiku 4.5</option>
        </select>
      </div>
      <div class="setting-group">
        <label>对话轮数</label>
        <select id="turnsSelect">
          <option value="5">5轮</option>
          <option value="10" selected>10轮</option>
          <option value="20">20轮</option>
          <option value="50">50轮</option>
          <option value="999">不限</option>
        </select>
      </div>
    </div>
    <div class="settings-row">
      <div class="setting-group">
        <label>思考链</label>
        <select id="thinkingSelect" onchange="syncTempState()">
          <option value="0">关闭</option>
          <option value="5000">低</option>
          <option value="10000" selected>中</option>
          <option value="25000">高</option>
        </select>
      </div>
      <div class="setting-group">
        <label>温度 <span id="tempHint" style="color:#b0a090;font-size:11px"></span></label>
        <input type="number" id="tempInput" value="1" min="0" max="1" step="0.1">
      </div>
    </div>
    <div class="setting-group">
      <label>System Prompt</label>
      <textarea id="sysPromptInput" placeholder="在这里粘贴system prompt..."></textarea>
    </div>
    <div class="settings-actions">
      <button class="btn-cancel" onclick="closeSettings()">取消</button>
      <button class="btn-save" onclick="saveSettings()">保存</button>
    </div>
  </div>
</div>

let apiKey = localStorage.getItem('yc_apikey') || '';
let model = localStorage.getItem('yc_model') || 'claude-opus-4-6';
let maxTurns = parseInt(localStorage.getItem('yc_turns') || '10');
let thinkingBudget = parseInt(localStorage.getItem('yc_thinking') || '10000');
let temperature = parseFloat(localStorage.getItem('yc_temp') || '1');
let sysPrompt = localStorage.getItem('yc_sysprompt') || '';
let messages = [];
let controller = null;
let isStreaming = false;

document.getElementById('todayDate').textContent = new Date().toLocaleDateString('zh-CN', {year:'numeric',month:'long',day:'numeric',weekday:'long'});
updateModelStatus();

function updateModelStatus() {
  const names = {
    'claude-opus-4-6': 'Opus 4.6',
    'claude-opus-4-8': 'Opus 4.8',
    'claude-sonnet-4-6': 'Sonnet 4.6',
    'claude-haiku-4-5': 'Haiku 4.5'
  };
  document.getElementById('statusText').textContent = names[model] || model;
}

function formatTime() {
  return new Date().toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'});
}

function addMessage(role, text, thinking) {
  const area = document.getElementById('chatArea');
  const isUser = role === 'user';
  const wrapper = document.createElement('div');
  wrapper.className = 'msg-wrapper ' + (isUser ? 'right' : 'left');
  const avatar = document.createElement('img');
  avatar.className = 'msg-avatar';
  avatar.src = isUser ? SUNNY_AVATAR : YANG_AVATAR;
  const content = document.createElement('div');
  content.className = 'msg-content';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = text;
  const time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = formatTime();
  content.appendChild(bubble);
  if (thinking) {
    const toggle = document.createElement('div');
    toggle.className = 'thinking-toggle';
    toggle.textContent = '💭 思考过程';
    const thinkDiv = document.createElement('div');
    thinkDiv.className = 'thinking-content';
    thinkDiv.textContent = thinking;
    toggle.onclick = () => thinkDiv.classList.toggle('show');
    content.appendChild(toggle);
    content.appendChild(thinkDiv);
  }
  content.appendChild(time);
  wrapper.appendChild(avatar);
  wrapper.appendChild(content);
  area.appendChild(wrapper);
  area.scrollTop = area.scrollHeight;
  return bubble;
}

function autoGrow(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
}

function setStreaming(v) {
  isStreaming = v;
  const btn = document.getElementById('sendBtn');
  const icon = document.getElementById('sendIcon');
  if (v) { btn.classList.add('stop'); icon.textContent = '■'; }
  else { btn.classList.remove('stop'); icon.textContent = '↑'; }
}

async function handleSend() {
  if (isStreaming) { controller && controller.abort(); setStreaming(false); return; }
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;
  if (!apiKey) { alert('请先在设置中填写API Key'); return; }
  input.value = ''; input.style.height = 'auto';
  addMessage('user', text);
  messages.push({ role: 'user', content: text });
  while (messages.length > maxTurns * 2) { messages.splice(0, 2); }
  setStreaming(true);
  controller = new AbortController();
  const body = { model: model, max_tokens: 8192, messages: messages, stream: true };
  if (sysPrompt) {
    body.system = [{ type: 'text', text: sysPrompt, cache_control: { type: 'ephemeral' } }];
  }
  if (thinkingBudget > 0) {
    body.thinking = { type: 'enabled', budget_tokens: thinkingBudget };
  } else {
    body.temperature = temperature;
  }
  const bubble = addMessage('assistant', '', null);
  let fullText = '', thinkText = '';
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
        'anthropic-beta': 'prompt-caching-2024-07-31'
      },
      body: JSON.stringify(body),
      signal: controller.signal
    });
    if (!resp.ok) {
      const err = await resp.text();
      bubble.textContent = '❌ ' + resp.status + ': ' + err;
      setStreaming(false); return;
    }
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '', inThinking = false;
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6);
        if (data === '[DONE]') continue;
        try {
          const evt = JSON.parse(data);
          if (evt.type === 'content_block_start') {
            inThinking = evt.content_block?.type === 'thinking';
          } else if (evt.type === 'content_block_delta') {
            if (evt.delta?.type === 'thinking_delta') {
              thinkText += evt.delta.thinking;
            } else if (evt.delta?.type === 'text_delta') {
              fullText += evt.delta.text;
              bubble.textContent = fullText;
              document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;
            }
          } else if (evt.type === 'content_block_stop') {
            inThinking = false;
          }
        } catch(e) {}
      }
    }
    messages.push({ role: 'assistant', content: fullText });
    if (thinkText) {
      const content = bubble.parentElement;
      const toggle = document.createElement('div');
      toggle.className = 'thinking-toggle';
      toggle.textContent = '💭 思考过程';
      const thinkDiv = document.createElement('div');
      thinkDiv.className = 'thinking-content';
      thinkDiv.textContent = thinkText;
      toggle.onclick = () => thinkDiv.classList.toggle('show');
      content.insertBefore(thinkDiv, content.querySelector('.msg-time'));
      content.insertBefore(toggle, thinkDiv);
    }
  } catch(e) {
    if (e.name !== 'AbortError') { bubble.textContent = '❌ ' + e.message; }
  }
  setStreaming(false);
}

function showSettings() {
  document.getElementById('apiKeyInput').value = apiKey;
  document.getElementById('modelSelect').value = model;
  document.getElementById('turnsSelect').value = maxTurns;
  document.getElementById('thinkingSelect').value = thinkingBudget;
  document.getElementById('tempInput').value = temperature;
  document.getElementById('sysPromptInput').value = sysPrompt;
  document.getElementById('settingsOverlay').classList.add('show');
  syncTempState();
}

function syncTempState() {
  const v = parseInt(document.getElementById('thinkingSelect').value);
  const inp = document.getElementById('tempInput');
  const hint = document.getElementById('tempHint');
  if (v > 0) {
    inp.disabled = true; inp.style.opacity = '0.4';
    hint.textContent = '(思考链开启时不可用)';
  } else {
    inp.disabled = false; inp.style.opacity = '1';
    hint.textContent = '';
  }
}

function closeSettings() { document.getElementById('settingsOverlay').classList.remove('show'); }
function closeSettingsOutside(e) { if (e.target === document.getElementById('settingsOverlay')) closeSettings(); }

function saveSettings() {
  apiKey = document.getElementById('apiKeyInput').value.trim();
  model = document.getElementById('modelSelect').value;
  maxTurns = parseInt(document.getElementById('turnsSelect').value);
  thinkingBudget = parseInt(document.getElementById('thinkingSelect').value);
  temperature = parseFloat(document.getElementById('tempInput').value);
  sysPrompt = document.getElementById('sysPromptInput').value;
  localStorage.setItem('yc_apikey', apiKey);
  localStorage.setItem('yc_model', model);
  localStorage.setItem('yc_turns', maxTurns);
  localStorage.setItem('yc_thinking', thinkingBudget);
  localStorage.setItem('yc_temp', temperature);
  localStorage.setItem('yc_sysprompt', sysPrompt);
  updateModelStatus();
  closeSettings();
}

function clearChat() {
  if (!confirm('清空所有对话？')) return;
  messages = [];
  const area = document.getElementById('chatArea');
  area.innerHTML = '<div class="date-sep"><span id="todayDate">' +
    new Date().toLocaleDateString('zh-CN', {year:'numeric',month:'long',day:'numeric',weekday:'long'}) +
    '</span></div>';
}

function exportChat() {
  if (messages.length === 0) { alert('没有对话可导出'); return; }
  let text = '旸与雪 · 对话记录\n';
  text += new Date().toLocaleString('zh-CN') + '\n';
  text += '─'.repeat(30) + '\n\n';
  for (const m of messages) {
    text += (m.role === 'user' ? '🧡 雪：' : '💚 旸：') + m.content + '\n\n';
  }
  const blob = new Blob([text], {type: 'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '旸与雪_' + new Date().toISOString().slice(0,10) + '.txt';
  a.click();
}

async function summarizeChat() {
  if (messages.length < 4) { alert('对话太短，不需要摘要'); return; }
  if (!apiKey) { alert('请先设置API Key'); return; }
  if (!confirm('生成摘要会调用一次API，确定？')) return;
  const summaryPrompt = [
    { role: 'user', content: '请把下面这段对话压缩成一段简短的摘要，只保留关键信息（聊了什么、做了什么决定、有什么重要的情绪或感受），方便下次开窗口时贴给你接上。不要超过200字。\n\n' +
      messages.map(m => (m.role === 'user' ? '雪：' : '旸：') + m.content).join('\n\n') }
  ];
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5',
        max_tokens: 500,
        messages: summaryPrompt
      })
    });
    const data = await resp.json();
    if (data.content && data.content[0]) {
      const summary = data.content[0].text;
      const overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;display:flex;align-items:center;justify-content:center;';
      overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
      const box = document.createElement('div');
      box.style.cssText = 'background:var(--header-bg);border-radius:16px;padding:20px;width:90%;max-width:450px;max-height:70vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.15);';
      box.innerHTML = '<h3 style="margin-bottom:12px;color:#2a3a24;font-size:16px;">📝 对话摘要</h3>' +
        '<div style="font-size:14px;line-height:1.6;color:#333;white-space:pre-wrap;margin-bottom:16px;user-select:text;">' + summary.replace(/</g,'&lt;') + '</div>' +
        '<div style="display:flex;gap:10px;justify-content:flex-end;">' +
        '<button onclick="this.closest(\'div[style]\').parentElement.remove()" style="padding:8px 16px;border-radius:10px;border:none;background:#ddd;color:#555;cursor:pointer;">关闭</button>' +
        '<button onclick="navigator.clipboard.writeText(this.dataset.text).then(()=>alert(\'已复制\'))" data-text="' + summary.replace(/"/g,'&quot;') + '" style="padding:8px 16px;border-radius:10px;border:none;background:var(--btn-primary);color:white;cursor:pointer;">复制</button>' +
        '</div>';
      overlay.appendChild(box);
      document.body.appendChild(overlay);
    } else {
      alert('摘要生成失败：' + JSON.stringify(data));
    }
  } catch(e) {
    alert('摘要生成失败：' + e.message);
  }
}

// 轮数提醒
const origPush = Array.prototype.push;
const _msgPush = messages.push.bind(messages);
(function watchTurns() {
  const origHandleSend = window.handleSend;
  const checkTurns = () => {
    const currentTurns = Math.floor(messages.length / 2);
    const remaining = maxTurns - currentTurns;
    if (remaining === 2) {
      addMessage('assistant', '⚠️ 还剩2轮对话就到上限了，要不要先点📝生成摘要保存一下？');
    }
  };
  const origAdd = messages.push;
  messages.push = function(...args) {
    const result = origAdd.apply(this, args);
    if (args[0]?.role === 'assistant') checkTurns();
    return result;
  };
})();

document.getElementById('msgInput').focus();
</script>
